<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Ekran Kamera</title>
    <style>
        /* Tüm ekranı kaplaması için temel ayarlar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Kamera görüntüsü */
        #videoElement {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Görüntünün ekranı tamamen doldurmasını sağlar */
        }

        /* Hata ve yükleme ekranı (overlay) */
        #overlay {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #statusText {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Düzelt butonu */
        #fixBtn {
            padding: 15px 40px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 30px;
            transition: transform 0.2s, background 0.3s;
        }

        #fixBtn:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }

        /* Yükleme çubuğu konteynırı */
        #loader-container {
            display: none;
            width: 300px;
            height: 6px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Soldan sağa hareket eden çizgi */
        #loader-bar {
            width: 0%;
            height: 100%;
            background: #3498db;
            position: absolute;
            left: 0;
            border-radius: 10px;
        }

        /* Çizgi ilerleme animasyonu */
        @keyframes fillBar {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <video autoplay="true" id="videoElement"></video>

    <div id="overlay">
        <div id="statusText">Kamera durduruldu, manuel olarak düzeltin.</div>
        <button id="fixBtn">Düzelt</button>
        
        <div id="loader-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <script>
        const video = document.querySelector("#videoElement");
        const overlay = document.querySelector("#overlay");
        const fixBtn = document.querySelector("#fixBtn");
        const statusText = document.querySelector("#statusText");
        const loaderContainer = document.querySelector("#loader-container");
        const loaderBar = document.querySelector("#loader-bar");

        let stream = null;
        let stopTimer = null;

        // Kamerayı Başlatma Fonksiyonu
        async function startCamera() {
            try {
                // Kamera akışını al
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // 5 dakika (300.000 milisaniye) sonra durdur
                stopTimer = setTimeout(stopCamera, 300000); 
            } catch (err) {
                console.error("Hata: ", err);
                statusText.innerText = "Kameraya erişim sağlanamadı!";
                overlay.style.display = "flex";
                fixBtn.style.display = "none";
            }
        }

        // Kamerayı Durdurma Fonksiyonu
        function stopCamera() {
            if (stream) {
                // Kamera donanımını serbest bırak
                stream.getTracks().forEach(track => track.stop());
            }
            // Arayüzü güncelle
            overlay.style.display = "flex";
            loaderContainer.style.display = "none";
            fixBtn.style.display = "block";
            statusText.innerText = "Kamera durduruldu, manuel olarak düzeltin.";
        }

        // Düzelt Butonuna Tıklandığında
        fixBtn.addEventListener("click", () => {
            fixBtn.style.display = "none"; // Butonu gizle
            statusText.innerText = "Yükleniyor...";
            loaderContainer.style.display = "block"; // Çizgiyi göster
            
            // Animasyonu başlat (3 saniye sürer)
            loaderBar.style.animation = "fillBar 3s linear forwards";

            // 3 saniye bekle ve kamerayı tekrar aç
            setTimeout(() => {
                overlay.style.display = "none"; // Karartmayı kaldır
                loaderBar.style.animation = "none"; // Animasyonu sıfırla
                startCamera(); // Kamerayı yeniden başlat
            }, 3000);
        });

        // Sayfa ilk açıldığında kamerayı başlat
        startCamera();
    </script>
</body>
</html>
