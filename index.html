<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera - 3 Dakika Sınırı</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Kamera Görüntüsü ve Mirror (Aynalama) */
        #videoElement {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Görüntüyü aynalar */
        }

        /* Karartma Ekranı */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #statusText {
            font-size: 1.4rem;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Düzelt Butonu */
        #fixBtn {
            padding: 15px 40px;
            font-size: 1.1rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            transition: background 0.3s;
        }

        #fixBtn:hover {
            background-color: #2980b9;
        }

        /* Yüklenme Çubuğu Alanı */
        #loader-container {
            display: none;
            width: 250px;
            height: 5px;
            background: #222;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        /* Soldan Sağa Giden Çizgi */
        #loader-bar {
            width: 0%;
            height: 100%;
            background: #2ecc71;
            position: absolute;
            left: 0;
        }

        @keyframes loadingAnim {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <video autoplay="true" id="videoElement"></video>

    <div id="overlay">
        <div id="statusText">Kamera durduruldu, manuel olarak düzeltin.</div>
        <button id="fixBtn">Düzelt</button>
        
        <div id="loader-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <script>
        const video = document.querySelector("#videoElement");
        const overlay = document.querySelector("#overlay");
        const fixBtn = document.querySelector("#fixBtn");
        const statusText = document.querySelector("#statusText");
        const loaderContainer = document.querySelector("#loader-container");
        const loaderBar = document.querySelector("#loader-bar");

        let stream = null;
        let countdown = null;

        // Kamerayı Başlat
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // 3 dakika (180.000 ms) sonra kamerayı kapat
                countdown = setTimeout(stopCamera, 180000); 
            } catch (err) {
                console.error("Kamera Hatası: ", err);
                statusText.innerText = "Kameraya erişim reddedildi!";
                overlay.style.display = "flex";
                fixBtn.style.display = "none";
            }
        }

        // Kamerayı Durdur
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            overlay.style.display = "flex";
            loaderContainer.style.display = "none";
            fixBtn.style.display = "block";
            statusText.innerText = "Kamera durduruldu, manuel olarak düzeltin.";
        }

        // Düzelt Butonu İşlemi
        fixBtn.addEventListener("click", () => {
            fixBtn.style.display = "none";
            statusText.innerText = "Yükleniyor...";
            loaderContainer.style.display = "block";
            
            // 3 saniyelik çizgi animasyonu
            loaderBar.style.animation = "loadingAnim 3s linear forwards";

            setTimeout(() => {
                overlay.style.display = "none";
                loaderBar.style.animation = "none";
                startCamera();
            }, 3000);
        });

        // Sayfa açıldığında başlat
        startCamera();
    </script>
</body>
</html>
