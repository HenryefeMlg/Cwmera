<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Ekran Mirror Kamera</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Kamera görüntüsü ve Aynalama (Mirror) */
        #videoElement {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1); /* Görüntüyü yatayda ters çevirir (Aynalar) */
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #statusText {
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-align: center;
        }

        #fixBtn {
            padding: 12px 35px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
        }

        /* Yükleme Çubuğu */
        #loader-container {
            display: none;
            width: 280px;
            height: 4px;
            background: #222;
            margin-top: 25px;
            position: relative;
            overflow: hidden;
        }

        #loader-bar {
            width: 0%;
            height: 100%;
            background: #3498db;
            position: absolute;
            left: 0;
        }

        @keyframes progress {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <video autoplay="true" id="videoElement"></video>

    <div id="overlay">
        <div id="statusText">Kamera durduruldu, manuel olarak düzeltin.</div>
        <button id="fixBtn">Düzelt</button>
        
        <div id="loader-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <script>
        const video = document.querySelector("#videoElement");
        const overlay = document.querySelector("#overlay");
        const fixBtn = document.querySelector("#fixBtn");
        const statusText = document.querySelector("#statusText");
        const loaderContainer = document.querySelector("#loader-container");
        const loaderBar = document.querySelector("#loader-bar");

        let stream = null;
        let timer = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                // 5 Dakika sonra durdur (300.000 ms)
                timer = setTimeout(stopCamera, 300000); 
            } catch (err) {
                statusText.innerText = "Kameraya ulaşılamadı!";
                overlay.style.display = "flex";
                fixBtn.style.display = "none";
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            overlay.style.display = "flex";
            loaderContainer.style.display = "none";
            fixBtn.style.display = "block";
            statusText.innerText = "Kamera durduruldu, manuel olarak düzeltin.";
        }

        fixBtn.addEventListener("click", () => {
            fixBtn.style.display = "none";
            statusText.innerText = "Yükleniyor...";
            loaderContainer.style.display = "block";
            
            // 3 saniyelik yükleme çizgisi animasyonu
            loaderBar.style.animation = "progress 3s linear forwards";

            setTimeout(() => {
                overlay.style.display = "none";
                loaderBar.style.animation = "none";
                startCamera();
            }, 3000);
        });

        startCamera();
    </script>
</body>
</html>
